<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ficha RPG — Avatar Corrigido (Versão Final)</title>
<style>
  :root{
    --bg:#0f1724; --card:#0b1220; --accent:#9b5cf6; --muted:#94a3b8; --paper:#f8fafc;
  }
  body{font-family:Inter,system-ui,Segoe UI,Roboto,Arial; background:linear-gradient(180deg,#071025 0%, #071a2a 100%); color:var(--paper); margin:0; padding:20px;}
  .container{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 420px;gap:18px;}
  header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  header h1{font-size:20px;margin:0;color:var(--accent);}
  .controls button{margin-left:8px;padding:8px 10px;border-radius:8px;border:0;background:var(--accent);color:#071025;font-weight:600;cursor:pointer;}
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); padding:14px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.03);}
  .sheet{display:grid;grid-template-columns:1fr;gap:12px;}
  .row{display:flex;gap:12px;align-items:center;}
  .field{background:rgba(255,255,255,0.02);padding:8px;border-radius:8px;min-width:0;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
  input[type="text"], input[type="number"], select, textarea{width:100%;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--paper);}
  .big{font-size:18px;padding:10px 12px;}
  .attributes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .attr{background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));padding:10px;border-radius:10px;text-align:center;}
  .attr .score{font-size:20px;font-weight:700;}
  .attr .mod{font-size:14px;color:var(--muted);}
  .skills{display:grid;grid-template-columns:1fr;gap:8px;}
  .skill{display:flex;align-items:center;gap:8px;padding:6px;border-radius:8px;background:rgba(255,255,255,0.01);}
  .skill input[type="checkbox"]{transform:scale(1.05);}
  .weapons table, .spells table{width:100%;border-collapse:collapse;color:var(--paper);}
  .weapons th, .weapons td, .spells th, .spells td{padding:6px;border-bottom:1px dashed rgba(255,255,255,0.03);font-size:13px;text-align:left;}
  .section-header{display:flex;justify-content:space-between;align-items:center;cursor:grab;padding:6px 0;}
  .collapse{background:none;border:0;color:var(--muted);cursor:pointer;}
  .right-col{display:flex;flex-direction:column;gap:12px;}
  footer{grid-column:1/-1;margin-top:12px;color:var(--muted);font-size:13px;text-align:center;}
  .dragging{opacity:0.7;transform:scale(0.995);}

  /* AVATAR: tamanho fixo e sem encolhimento */
  .avatar-wrap{display:flex;gap:12px;align-items:center;}
  .avatar-preview{
    width:160px;
    height:160px;
    min-width:160px;
    min-height:160px;
    border-radius:8px;
    background:rgba(255,255,255,0.02);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.04);
    position:relative;
    flex:0 0 auto; /* importante: evita shrink */
  }
  .avatar-preview img{
    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
    -webkit-user-drag: none;
    user-select: none;
  }
  .avatar-controls{display:flex;flex-direction:column;gap:6px;}
  .small-btn{padding:6px 8px;border-radius:8px;border:0;background:var(--accent);color:#071025;font-weight:600;cursor:pointer;}
  .avatar-preview.dragover{outline:3px dashed rgba(155,92,246,0.6);}

  @media print{
    body{background:white;color:black;}
    .controls, .collapse{display:none;}
    .container{grid-template-columns:1fr;}
  }
  @media (max-width:980px){
    .container{grid-template-columns:1fr; padding:12px;}
    .attributes{grid-template-columns:repeat(2,1fr);}
    .avatar-preview{width:120px;height:120px;min-width:120px;min-height:120px;}
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Ficha RPG — Avatar Corrigido</h1>
      <div class="controls">
        <button id="saveBtn">Salvar</button>
        <button id="loadBtn">Carregar</button>
        <button id="exportBtn">Exportar JSON</button>
        <button id="importBtn">Importar JSON</button>
        <button id="clearBtn">Limpar</button>
      </div>
    </header>

    <main class="card sheet" id="mainSheet">
      <!-- Identidade com avatar ao lado -->
      <section class="card" data-section="identidade">
        <div class="section-header" draggable="true">
          <strong>Identidade</strong>
          <div><button class="collapse" data-target="identidade">—</button></div>
        </div>
        <div class="content" id="identidade">
          <div style="display:flex;gap:12px;align-items:flex-start;">
            <div style="flex:1;">
              <div class="row">
                <div class="field" style="flex:1">
                  <label>Nome do personagem</label>
                  <div id="nome" class="big" contenteditable="true" data-key="nome">Seu Nome</div>
                </div>
                <div class="field" style="width:160px">
                  <label>Classe</label>
                  <input id="classe" data-key="classe" type="text" placeholder="Guerreiro" />
                </div>
                <div class="field" style="width:120px">
                  <label>Nível</label>
                  <input id="nivel" data-key="nivel" type="number" min="1" max="20" value="1" />
                </div>
                <div class="field" style="width:120px">
                  <label>XP</label>
                  <input id="xp" data-key="xp" type="number" min="0" />
                </div>
              </div>

              <div class="row" style="margin-top:8px">
                <div class="field" style="flex:1">
                  <label>Antecedente / Raça / Subclasse</label>
                  <input id="antecedente" data-key="antecedente" type="text" placeholder="Antecedente" />
                </div>
                <div class="field" style="width:140px">
                  <label>Classe de Armadura</label>
                  <input id="ca" data-key="ca" type="number" min="0" />
                </div>
                <div class="field" style="width:120px">
                  <label>Escudo</label>
                  <input id="escudo" data-key="escudo" type="text" />
                </div>
              </div>
            </div>

            <div style="width:220px;">
              <label style="color:var(--muted);font-size:12px;margin-bottom:6px;display:block">Avatar</label>
              <div class="card" style="padding:10px;">
                <div class="avatar-wrap">
                  <div class="avatar-preview" id="avatarPreview" title="Arraste uma imagem aqui">
                    <span id="avatarPlaceholder" style="color:var(--muted);font-size:13px;text-align:center;padding:8px">Sem imagem</span>
                  </div>
                  <div class="avatar-controls" style="flex:1">
                    <input id="avatarInput" type="file" accept="image/*" style="display:none" />
                    <div style="display:flex;gap:8px">
                      <button class="small-btn" id="uploadAvatarBtn">Carregar</button>
                      <button class="small-btn" id="removeAvatarBtn">Remover</button>
                    </div>
                    <div style="margin-top:8px;color:var(--muted);font-size:12px">A imagem é salva localmente e incluída no JSON exportado.</div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </section>

      <!-- (outras seções mantidas; omitidas aqui por brevidade no exemplo) -->
      <section class="card" data-section="atributos">
        <div class="section-header" draggable="true"><strong>Atributos</strong><div><button class="collapse" data-target="atributos">—</button></div></div>
        <div class="content" id="atributos">
          <div class="attributes">
            <div class="attr"><label>Força</label><input id="forca" data-key="forca" type="number" value="10" /><div class="score" id="forca_score">10</div><div class="mod" id="forca_mod">+0</div></div>
            <div class="attr"><label>Destreza</label><input id="destreza" data-key="destreza" type="number" value="10" /><div class="score" id="destreza_score">10</div><div class="mod" id="destreza_mod">+0</div></div>
            <div class="attr"><label>Constituição</label><input id="constituicao" data-key="constituicao" type="number" value="10" /><div class="score" id="constituicao_score">10</div><div class="mod" id="constituicao_mod">+0</div></div>
            <div class="attr"><label>Inteligência</label><input id="inteligencia" data-key="inteligencia" type="number" value="10" /><div class="score" id="inteligencia_score">10</div><div class="mod" id="inteligencia_mod">+0</div></div>
            <div class="attr"><label>Sabedoria</label><input id="sabedoria" data-key="sabedoria" type="number" value="10" /><div class="score" id="sabedoria_score">10</div><div class="mod" id="sabedoria_mod">+0</div></div>
            <div class="attr"><label>Carisma</label><input id="carisma" data-key="carisma" type="number" value="10" /><div class="score" id="carisma_score">10</div><div class="mod" id="carisma_mod">+0</div></div>
          </div>
        </div>
      </section>
    </main>

    <aside class="right-col">
      <div class="card"><strong>Resumo</strong><div style="margin-top:8px"><label>HP</label><input id="hp_quick" readonly /></div></div>
    </aside>

    <footer>Teste: carregue uma imagem com o botão Carregar ou arraste-a para o quadrado.</footer>
  </div>

<script>
/* ---------- Utilitários ---------- */
const qs = s => document.querySelector(s);
const qsa = s => Array.from(document.querySelectorAll(s));
const storageKey = 'fichaRPG_v1';

/* ---------- Avatar helpers ---------- */
function createPlaceholder(){
  const ph = document.createElement('span');
  ph.id = 'avatarPlaceholder';
  ph.style.color = 'var(--muted)';
  ph.style.fontSize = '13px';
  ph.style.textAlign = 'center';
  ph.style.padding = '8px';
  ph.textContent = 'Sem imagem';
  return ph;
}

function setAvatarFromDataURL(dataURL){
  const preview = qs('#avatarPreview');
  preview.innerHTML = '';
  if(!dataURL){
    preview.appendChild(createPlaceholder());
    preview.dataset.image = '';
    return;
  }
  const img = new Image();
  img.onload = () => {
    // garante que a imagem ocupe todo o preview (CSS object-fit:cover)
    preview.innerHTML = '';
    preview.appendChild(img);
    preview.dataset.image = dataURL;
  };
  img.onerror = () => {
    preview.innerHTML = '';
    preview.appendChild(createPlaceholder());
    preview.dataset.image = '';
    alert('Erro ao carregar a imagem. Tente outro arquivo.');
  };
  img.src = dataURL;
}

/* Redimensiona via canvas e retorna dataURL */
function resizeImageFileToDataURL(file, maxDim = 1200, quality = 0.9){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Falha ao ler o arquivo.'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Arquivo não é uma imagem válida.'));
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * (maxDim / w)); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w * (maxDim / h)); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const mime = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
        const dataURL = canvas.toDataURL(mime, quality);
        resolve(dataURL);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* Processa arquivo e atualiza preview */
async function processAndSetAvatar(file){
  if(!file) return;
  try{
    const maxInlineBytes = 1.5 * 1024 * 1024;
    let dataURL;
    if(file.size > maxInlineBytes){
      dataURL = await resizeImageFileToDataURL(file, 1000, 0.8);
    } else {
      dataURL = await resizeImageFileToDataURL(file, 1200, 0.92);
    }
    setAvatarFromDataURL(dataURL);
  } catch(err){
    console.error(err);
    alert('Não foi possível processar a imagem: ' + (err.message || err));
    setAvatarFromDataURL(null);
  }
}

/* ---------- UI events ---------- */
qs('#uploadAvatarBtn').addEventListener('click', ()=>qs('#avatarInput').click());
qs('#removeAvatarBtn').addEventListener('click', ()=>{
  qs('#avatarInput').value = '';
  setAvatarFromDataURL(null);
});
qs('#avatarInput').addEventListener('change', e=>{
  const f = e.target.files && e.target.files[0];
  if(!f) return;
  processAndSetAvatar(f);
});

/* drag & drop */
const previewEl = qs('#avatarPreview');
['dragenter','dragover'].forEach(ev=>{
  previewEl.addEventListener(ev, (e)=>{ e.preventDefault(); e.stopPropagation(); previewEl.classList.add('dragover'); });
});
['dragleave','drop'].forEach(ev=>{
  previewEl.addEventListener(ev, (e)=>{ e.preventDefault(); e.stopPropagation(); previewEl.classList.remove('dragover'); });
});
previewEl.addEventListener('drop', (e)=>{
  const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if(!f) return;
  processAndSetAvatar(f);
});

/* ---------- Minimal persistence for test (keeps avatar) ---------- */
function gatherData(){
  const data = {};
  data.nome = qs('#nome').innerText || '';
  data.classe = qs('#classe').value || '';
  data.nivel = qs('#nivel').value || '';
  data.avatarDataURL = qs('#avatarPreview').dataset.image || '';
  return data;
}
function applyData(data){
  if(!data) return;
  if(data.nome) qs('#nome').innerText = data.nome;
  if(data.classe) qs('#classe').value = data.classe;
  if(data.nivel) qs('#nivel').value = data.nivel;
  if(data.avatarDataURL) setAvatarFromDataURL(data.avatarDataURL);
  else setAvatarFromDataURL(null);
}
qs('#saveBtn').addEventListener('click', ()=>{
  localStorage.setItem(storageKey, JSON.stringify(gatherData()));
  alert('Ficha salva.');
});
qs('#loadBtn').addEventListener('click', ()=>{
  const raw = localStorage.getItem(storageKey);
  if(!raw){ alert('Nenhuma ficha salva.'); return; }
  applyData(JSON.parse(raw));
  alert('Ficha carregada.');
});
qs('#exportBtn').addEventListener('click', ()=>{
  const data = gatherData();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'ficha-rpg.json'; a.click(); URL.revokeObjectURL(url);
});
qs('#importBtn').addEventListener('click', ()=>{
  const inp = document.createElement('input'); inp.type='file'; inp.accept='application/json';
  inp.onchange = e=>{
    const f = e.target.files[0]; if(!f) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{ applyData(JSON.parse(ev.target.result)); alert('JSON importado.'); } catch { alert('Arquivo inválido.'); }
    };
    reader.readAsText(f);
  };
  inp.click();
});
qs('#clearBtn').addEventListener('click', ()=>{
  if(!confirm('Limpar todos os campos?')) return;
  qs('#nome').innerText = '';
  qs('#classe').value = '';
  qs('#nivel').value = 1;
  setAvatarFromDataURL(null);
});

/* ---------- Init ---------- */
(function init(){
  setAvatarFromDataURL(null);
  const raw = localStorage.getItem(storageKey);
  if(raw) applyData(JSON.parse(raw));
})();
</script>
</body>
</html>
