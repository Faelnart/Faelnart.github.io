<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ficha RPG — Visual Polido</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  :root{
    --bg-start: #1c1c1c;
    --bg-end:   #e6e6e6;
    --card-start: #696969;
    --card-end:   #f3f4f6;
    --accent: #7c5cff;
    --accent-2: #4b5563;
    --muted: #4b5563;
    --text: #111827;
    --radius: 12px;
    --shadow: 0 10px 30px rgba(15,23,36,0.08);
    --gap: 18px;
    --field-height:48px;
    --input-padding:12px;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:Inter, system-ui, sans-serif;
    background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    padding:28px;
  }

  .container{
    max-width:1320px;
    margin:0 auto;
    display:grid;
    grid-template-columns: 1fr 380px;
    gap:var(--gap);
    align-items:start;
  }

  header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  header h1{margin:0;font-size:22px;color:var(--accent);font-weight:800}
  
  .controls{display:flex;gap:10px}
  .btn{
    background:linear-gradient(90deg,var(--accent),#5f3df5);
    color:white;border:0;padding:10px 16px;border-radius:10px;font-weight:700;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .1s;
  }
  .btn:active{transform:scale(0.98)}
  .btn-ghost{
    background:rgba(255,255,255,0.5);border:1px solid rgba(0,0,0,0.1);padding:10px 12px;border-radius:10px;color:var(--accent-2);cursor:pointer;
  }

  .card{
    background: linear-gradient(180deg,var(--card-start), var(--card-end));
    padding:16px;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.2);
  }
  .sheet{display:grid;grid-template-columns:1fr;gap:14px}

  .section-header{display:flex;justify-content:space-between;align-items:center;padding:6px 0;margin-bottom:6px}
  .section-header strong{font-size:16px;text-transform:uppercase;letter-spacing:0.5px}

  .row{display:flex;gap:12px;align-items:center;margin-bottom:8px}
  .field{background:transparent;padding:6px;border-radius:10px;min-width:0}
  label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
  
  input[type="text"], input[type="number"], select, textarea{
    width:100%;padding:var(--input-padding);border-radius:8px;border:1px solid rgba(0,0,0,0.1);
    background:rgba(255,255,255,0.9);color:var(--text);height:var(--field-height);font-size:14px;outline:none;
  }
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,0.1)}

  .big{font-size:20px;padding:12px;min-height:52px;border-radius:10px;background:#fff;border:1px solid rgba(0,0,0,0.05);font-weight:700}

  .attributes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .attr{padding:12px;border-radius:10px;background:#fff;text-align:center;border:1px solid rgba(0,0,0,0.05)}
  .attr .score{font-size:24px;font-weight:900;color:var(--accent)}
  .attr .mod{font-size:14px;font-weight:700;color:var(--muted)}

  .skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .skill{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:#fff;font-size:13px;border:1px solid rgba(0,0,0,0.03)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:10px;border-bottom:1px solid rgba(0,0,0,0.05);text-align:left}
  .small-btn{padding:8px 12px;border-radius:8px;border:0;background:var(--accent);color:white;cursor:pointer;font-weight:700}

  /* Avatar Area - Somente Arrastar */
  .avatar-preview{
    width:180px;height:180px;border-radius:12px;
    background:#fff;display:flex;align-items:center;justify-content:center;
    overflow:hidden;border:2px dashed rgba(0,0,0,0.1);
    transition: all 0.2s ease;
    position:relative;
    cursor: default; /* Remove o cursor de clique */
  }
  .avatar-preview img{width:100%;height:100%;object-fit:cover}
  
  .right-col .card{margin-bottom:var(--gap)}
  
  @media (max-width:900px){ .container{grid-template-columns:1fr} }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>FICHA RPG — PRO</h1>
    <div class="controls">
      <button id="saveBtn" class="btn">Salvar</button>
      <button id="exportBtn" class="btn-ghost">Exportar JSON</button>
      <button id="clearBtn" class="btn-ghost">Limpar</button>
    </div>
  </header>

  <main class="card sheet">
    <section class="card" style="background:#f9fafb">
      <div class="section-header"><strong>Identidade do Herói</strong></div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <div style="flex:1; min-width:300px">
          <div class="field">
            <label>Nome do Personagem</label>
            <div id="nome" class="big" contenteditable="true" data-key="nome">Novo Aventureiro</div>
          </div>
          <div class="row">
            <div class="field" style="flex:2"><label>Classe</label><input id="classe" data-key="classe" type="text" /></div>
            <div class="field" style="flex:1"><label>Nível</label><input id="nivel" data-key="nivel" type="number" value="1" /></div>
          </div>
        </div>
        
        <div>
          <label>Avatar (Arraste a imagem aqui)</label>
          <div class="avatar-preview" id="avatarPreview">
            <span id="avatarPlaceholder" style="font-size:12px; color:#9ca3af; text-align:center; padding:10px">Solte a foto aqui</span>
          </div>
          <input type="checkbox" id="toggleCircular" style="margin-top:8px"> <span style="font-size:12px">Circular</span>
        </div>
      </div>
    </section>

    <section class="card" style="background:#fff">
      <div class="section-header"><strong>Atributos e Modificadores</strong></div>
      <div class="attributes">
        <div class="attr"><label>FOR</label><input id="forca" data-key="forca" type="number" value="10" /><div class="score" id="forca_score">10</div><div class="mod" id="forca_mod">+0</div></div>
        <div class="attr"><label>DES</label><input id="destreza" data-key="destreza" type="number" value="10" /><div class="score" id="destreza_score">10</div><div class="mod" id="destreza_mod">+0</div></div>
        <div class="attr"><label>CON</label><input id="constituicao" data-key="constituicao" type="number" value="10" /><div class="score" id="constituicao_score">10</div><div class="mod" id="constituicao_mod">+0</div></div>
        <div class="attr"><label>INT</label><input id="inteligencia" data-key="inteligencia" type="number" value="10" /><div class="score" id="inteligencia_score">10</div><div class="mod" id="inteligencia_mod">+0</div></div>
        <div class="attr"><label>SAB</label><input id="sabedoria" data-key="sabedoria" type="number" value="10" /><div class="score" id="sabedoria_score">10</div><div class="mod" id="sabedoria_mod">+0</div></div>
        <div class="attr"><label>CAR</label><input id="carisma" data-key="carisma" type="number" value="10" /><div class="score" id="carisma_score">10</div><div class="mod" id="carisma_mod">+0</div></div>
      </div>
    </section>

    <section class="card" style="background:#fff">
        <div class="section-header"><strong>Combate</strong></div>
        <table id="weaponsTable">
          <thead><tr><th>Arma</th><th>Bônus</th><th>Dano</th><th>Notas</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="row" style="margin-top:10px">
          <input id="w_name" placeholder="Nome">
          <input id="w_bonus" placeholder="Atq" style="width:80px">
          <input id="w_dmg" placeholder="Dano">
          <button id="addWeapon" class="small-btn">Add</button>
        </div>
    </section>
  </main>

  <aside class="right-col">
    <div class="card" style="background:#111827; color:#fff">
      <strong>Status Rápidos</strong>
      <div style="margin-top:15px">
        <label style="color:#9ca3af">Vida (HP)</label>
        <div style="display:flex; gap:5px">
            <input id="hp_atual" data-key="hp_atual" type="number" placeholder="Atual" style="background:#1f2937; color:#fff; border:0">
            <input id="hp_max" data-key="hp_max" type="number" placeholder="Máx" style="background:#1f2937; color:#fff; border:0">
        </div>
        <label style="color:#9ca3af; margin-top:10px">Iniciativa</label>
        <input id="iniciativa" readonly style="background:#1f2937; color:var(--accent); border:0; font-weight:800; font-size:18px">
      </div>
    </div>
  </aside>
</div>

<script>
const qs = sel => document.querySelector(sel);
const qsa = sel => Array.from(document.querySelectorAll(sel));
const storageKey = 'ficha_rpg_polished';

/* --- Lógica de Atributos --- */
function modFromScore(s) { return Math.floor((s - 10) / 2); }
function formatMod(n) { return (n >= 0 ? '+' : '') + n; }

function updateAttributes() {
  const attrs = ['forca','destreza','constituicao','inteligencia','sabedoria','carisma'];
  attrs.forEach(a => {
    const val = parseInt(qs('#'+a).value || 10, 10);
    qs('#'+a+'_score').textContent = val;
    qs('#'+a+'_mod').textContent = formatMod(modFromScore(val));
  });
  const dexVal = parseInt(qs('#destreza').value || 10, 10);
  qs('#iniciativa').value = formatMod(modFromScore(dexVal));
}

/* --- Avatar: Drag & Drop Apenas --- */
const avPreview = qs('#avatarPreview');

avPreview.addEventListener('dragover', e => {
  e.preventDefault();
  avPreview.style.borderColor = 'var(--accent)';
  avPreview.style.background = '#f3f0ff';
});

avPreview.addEventListener('dragleave', () => {
  avPreview.style.borderColor = 'rgba(0,0,0,0.1)';
  avPreview.style.background = '#fff';
});

avPreview.addEventListener('drop', e => {
  e.preventDefault();
  avPreview.style.borderColor = 'rgba(0,0,0,0.1)';
  avPreview.style.background = '#fff';
  
  if (e.dataTransfer.files && e.dataTransfer.files[0]) {
    const file = e.dataTransfer.files[0];
    if (file.type.startsWith('image/')) {
        processAndSetAvatar(file);
    }
  }
});

async function processAndSetAvatar(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const side = Math.min(img.width, img.height);
      canvas.width = 400; canvas.height = 400;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, (img.width-side)/2, (img.height-side)/2, side, side, 0, 0, 400, 400);
      const dataURL = canvas.toDataURL('image/jpeg', 0.8);
      avPreview.innerHTML = `<img src="${dataURL}">`;
      avPreview.dataset.image = dataURL;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

qs('#toggleCircular').onchange = e => {
    avPreview.style.borderRadius = e.target.checked ? '50%' : '12px';
};

/* --- Gerenciamento de Dados --- */
function gatherData() {
  const data = { weapons: [] };
  qsa('[data-key]').forEach(el => {
    data[el.dataset.key] = el.contentEditable === 'true' ? el.innerText : el.value;
  });
  data.avatar = avPreview.dataset.image || '';
  data.circular = qs('#toggleCircular').checked;
  qsa('#weaponsTable tbody tr').forEach(tr => {
      const tds = tr.querySelectorAll('td');
      data.weapons.push({n: tds[0].innerText, b: tds[1].innerText, d: tds[2].innerText});
  });
  return data;
}

function applyData(data) {
  if(!data) return;
  qsa('[data-key]').forEach(el => {
    const val = data[el.dataset.key];
    if (el.contentEditable === 'true') el.innerText = val || '';
    else el.value = val || '';
  });
  if(data.avatar) {
      avPreview.innerHTML = `<img src="${data.avatar}">`;
      avPreview.dataset.image = data.avatar;
  }
  qs('#toggleCircular').checked = !!data.circular;
  avPreview.style.borderRadius = data.circular ? '50%' : '12px';
  const tbody = qs('#weaponsTable tbody');
  tbody.innerHTML = '';
  (data.weapons || []).forEach(w => addWeaponRow(w));
  updateAttributes();
}

function addWeaponRow(w) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${w.n}</td><td>${w.b}</td><td>${w.d}</td><td>-</td><td><button onclick="this.parentElement.parentElement.remove()">X</button></td>`;
    qs('#weaponsTable tbody').appendChild(tr);
}

/* --- Eventos --- */
qs('#addWeapon').onclick = () => {
    addWeaponRow({n: qs('#w_name').value, b: qs('#w_bonus').value, d: qs('#w_dmg').value});
    qs('#w_name').value = ''; qs('#w_bonus').value = ''; qs('#w_dmg').value = '';
};

qs('#saveBtn').onclick = () => {
    localStorage.setItem(storageKey, JSON.stringify(gatherData()));
    alert('Salvo!');
};

qs('#exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(gatherData())], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ficha.json';
    a.click();
};

qs('#clearBtn').onclick = () => { if(confirm('Limpar tudo?')) { localStorage.removeItem(storageKey); location.reload(); } };

qsa('input').forEach(i => i.oninput = updateAttributes);

window.onload = () => {
    const saved = localStorage.getItem(storageKey);
    if(saved) applyData(JSON.parse(saved));
    updateAttributes();
};
</script>

</body>
</html>
