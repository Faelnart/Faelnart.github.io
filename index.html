<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ficha RPG — Layout Espaçoso (sem Aparência/História)</title>
<style>
  :root{
    --bg:#071025;
    --card:#071827;
    --accent:#8b5cf6;
    --muted:#9fb0c8;
    --paper:#eef6fb;
    --gap:18px;
    --field-height:44px;
    --input-padding:12px;
    --radius:10px;
  }

  *{box-sizing:border-box}
  body{
    font-family:Inter,system-ui,Segoe UI,Roboto,Arial;
    background:linear-gradient(180deg,var(--bg) 0%, #071a2a 100%);
    color:var(--paper);
    margin:0;
    padding:24px;
  }

  .container{
    max-width:1320px;
    margin:0 auto;
    display:grid;
    grid-template-columns:1fr 380px;
    gap:var(--gap);
    align-items:start;
  }

  header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  header h1{font-size:20px;margin:0;color:var(--accent);letter-spacing:0.2px}
  .controls button{margin-left:8px;padding:10px 12px;border-radius:10px;border:0;background:var(--accent);color:#071025;font-weight:700;cursor:pointer;font-size:13px}

  .card{
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    padding:16px;border-radius:12px;
    box-shadow:0 8px 22px rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.03);
  }

  .sheet{display:grid;grid-template-columns:1fr;gap:14px;}
  .section-header{display:flex;justify-content:space-between;align-items:center;cursor:grab;padding:6px 0;margin-bottom:6px}
  .section-header strong{font-size:15px}
  .collapse{background:none;border:0;color:var(--muted);cursor:pointer;font-size:18px}

  .row{display:flex;gap:12px;align-items:center;margin-bottom:8px}
  .field{background:rgba(255,255,255,0.02);padding:10px;border-radius:10px;min-width:0}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px}
  input[type="text"], input[type="number"], select, textarea{
    width:100%;
    padding:var(--input-padding);
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.04);
    background:transparent;color:var(--paper);
    height:var(--field-height);
    font-size:14px;
  }
  textarea{height:120px;resize:vertical;padding-top:10px;padding-bottom:10px}

  .big{font-size:20px;padding:12px 14px;min-height:48px}
  .attributes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .attr{background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));padding:12px;border-radius:10px;text-align:center}
  .attr .score{font-size:22px;font-weight:700;margin-top:6px}
  .attr .mod{font-size:14px;color:var(--muted);margin-top:6px}

  .skills{display:grid;grid-template-columns:1fr;gap:10px}
  .skill{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.01)}
  .skill input[type="checkbox"]{transform:scale(1.05)}

  .weapons table, .spells table{width:100%;border-collapse:collapse;color:var(--paper);font-size:14px}
  .weapons th, .weapons td, .spells th, .spells td{padding:8px;border-bottom:1px dashed rgba(255,255,255,0.03);text-align:left}

  .right-col{display:flex;flex-direction:column;gap:12px}
  .small-btn{padding:8px 10px;border-radius:8px;border:0;background:var(--accent);color:#071025;font-weight:700;cursor:pointer;font-size:13px}

  /* Avatar: maior e sem encolhimento */
  .avatar-wrap{display:flex;gap:14px;align-items:center}
  .avatar-preview{
    width:180px;height:180px;min-width:180px;min-height:180px;border-radius:10px;
    background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(255,255,255,0.04);flex:0 0 auto;
  }
  .avatar-preview img{width:100%;height:100%;object-fit:cover;display:block}

  /* spacing helpers */
  .spaced{margin-top:12px;margin-bottom:12px}
  .muted{color:var(--muted);font-size:13px}

  /* responsive */
  @media (max-width:1100px){
    .container{grid-template-columns:1fr 360px}
  }
  @media (max-width:900px){
    .container{grid-template-columns:1fr; padding:12px}
    .avatar-preview{width:140px;height:140px;min-width:140px;min-height:140px}
    .attributes{grid-template-columns:repeat(2,1fr)}
  }
  @media (max-width:520px){
    .attributes{grid-template-columns:1fr}
    input[type="text"], input[type="number"]{height:44px}
    .avatar-preview{width:120px;height:120px;min-width:120px;min-height:120px}
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Ficha RPG — Layout Espaçoso (sem Aparência/História)</h1>
      <div class="controls">
        <button id="saveBtn">Salvar</button>
        <button id="loadBtn">Carregar</button>
        <button id="exportBtn">Exportar JSON</button>
        <button id="importBtn">Importar JSON</button>
        <button id="clearBtn">Limpar</button>
      </div>
    </header>

    <main class="card sheet" id="mainSheet">
      <!-- Identidade -->
      <section class="card" data-section="identidade">
        <div class="section-header" draggable="true">
          <strong>Identidade</strong>
          <div><button class="collapse" data-target="identidade">—</button></div>
        </div>
        <div class="content" id="identidade">
          <div style="display:flex;gap:16px;align-items:flex-start;">
            <div style="flex:1">
              <div class="row">
                <div class="field" style="flex:1">
                  <label>Nome do personagem</label>
                  <div id="nome" class="big" contenteditable="true" data-key="nome">Seu Nome</div>
                </div>
                <div class="field" style="width:180px">
                  <label>Classe</label>
                  <input id="classe" data-key="classe" type="text" placeholder="Guerreiro" />
                </div>
                <div class="field" style="width:120px">
                  <label>Nível</label>
                  <input id="nivel" data-key="nivel" type="number" min="1" max="20" value="1" />
                </div>
                <div class="field" style="width:140px">
                  <label>XP</label>
                  <input id="xp" data-key="xp" type="number" min="0" />
                </div>
              </div>

              <div class="row spaced">
                <div class="field" style="flex:1">
                  <label>Antecedente / Raça / Subclasse</label>
                  <input id="antecedente" data-key="antecedente" type="text" placeholder="Antecedente" />
                </div>
                <div class="field" style="width:160px">
                  <label>Classe de Armadura</label>
                  <input id="ca" data-key="ca" type="number" min="0" />
                </div>
                <div class="field" style="width:140px">
                  <label>Escudo</label>
                  <input id="escudo" data-key="escudo" type="text" />
                </div>
              </div>
            </div>

            <div style="width:240px">
              <label class="muted">Avatar</label>
              <div class="card" style="padding:12px">
                <div class="avatar-wrap">
                  <div class="avatar-preview" id="avatarPreview" title="Arraste uma imagem aqui">
                    <span id="avatarPlaceholder" class="muted">Sem imagem</span>
                  </div>
                  <div style="flex:1;display:flex;flex-direction:column;gap:10px">
                    <input id="avatarInput" type="file" accept="image/*" style="display:none" />
                    <div style="display:flex;gap:8px">
                      <button class="small-btn" id="uploadAvatarBtn">Carregar</button>
                      <button class="small-btn" id="removeAvatarBtn">Remover</button>
                    </div>
                    <div class="muted" style="font-size:13px">Imagem salva localmente e incluída no JSON exportado.</div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </section>

      <!-- HP -->
      <section class="card" data-section="hp">
        <div class="section-header" draggable="true">
          <strong>Pontos de Vida</strong>
          <div><button class="collapse" data-target="hp">—</button></div>
        </div>
        <div class="content" id="hp">
          <div class="row">
            <div class="field" style="width:140px"><label>Atual</label><input id="hp_atual" data-key="hp_atual" type="number" min="0" /></div>
            <div class="field" style="width:140px"><label>Máx</label><input id="hp_max" data-key="hp_max" type="number" min="0" /></div>
            <div class="field" style="width:140px"><label>Temporário</label><input id="hp_temp" data-key="hp_temp" type="number" min="0" /></div>
            <div class="field" style="width:160px"><label>Dado de Vida</label><input id="dado_vida" data-key="dado_vida" type="text" placeholder="1d10" /></div>
          </div>

          <div class="row spaced">
            <div class="field" style="width:260px">
              <label>Salvaguardas contra morte</label>
              <div style="display:flex;gap:10px">
                <input id="death_success" data-key="death_success" type="number" min="0" max="3" placeholder="Sucessos" />
                <input id="death_fail" data-key="death_fail" type="number" min="0" max="3" placeholder="Falhas" />
              </div>
            </div>
            <div class="field" style="flex:1"><label>Inspiração</label><input id="inspiracao" data-key="inspiracao" type="text" placeholder="Inspiração heroica" /></div>
          </div>
        </div>
      </section>

      <!-- Atributos e perícias -->
      <section class="card" data-section="atributos">
        <div class="section-header" draggable="true">
          <strong>Atributos e Perícias</strong>
          <div><button class="collapse" data-target="atributos">—</button></div>
        </div>
        <div class="content" id="atributos">
          <div class="attributes">
            <div class="attr"><label>Força</label><input id="forca" data-key="forca" type="number" value="10" /><div class="score" id="forca_score">10</div><div class="mod" id="forca_mod">+0</div></div>
            <div class="attr"><label>Destreza</label><input id="destreza" data-key="destreza" type="number" value="10" /><div class="score" id="destreza_score">10</div><div class="mod" id="destreza_mod">+0</div></div>
            <div class="attr"><label>Constituição</label><input id="constituicao" data-key="constituicao" type="number" value="10" /><div class="score" id="constituicao_score">10</div><div class="mod" id="constituicao_mod">+0</div></div>
            <div class="attr"><label>Inteligência</label><input id="inteligencia" data-key="inteligencia" type="number" value="10" /><div class="score" id="inteligencia_score">10</div><div class="mod" id="inteligencia_mod">+0</div></div>
            <div class="attr"><label>Sabedoria</label><input id="sabedoria" data-key="sabedoria" type="number" value="10" /><div class="score" id="sabedoria_score">10</div><div class="mod" id="sabedoria_mod">+0</div></div>
            <div class="attr"><label>Carisma</label><input id="carisma" data-key="carisma" type="number" value="10" /><div class="score" id="carisma_score">10</div><div class="mod" id="carisma_mod">+0</div></div>
          </div>

          <div class="spaced">
            <label><strong>Bônus de Proficiência</strong></label>
            <div style="display:flex;gap:12px;align-items:center;margin-top:8px">
              <input id="prof_bonus" data-key="prof_bonus" type="number" value="2" style="width:100px;height:44px;padding:10px" />
              <label style="display:flex;align-items:center;gap:8px;color:var(--muted)">
                <input id="autoProf" data-key="autoProf" type="checkbox" /> Calcular proficiência por nível
              </label>
              <div class="muted">Automático: níveis 1–4 = +2; 5–8 = +3; 9–12 = +4; 13–16 = +5; 17–20 = +6.</div>
            </div>
          </div>

          <div class="spaced" style="display:flex;gap:12px">
            <div style="flex:1">
              <div class="card" style="padding:12px">
                <strong>Perícias</strong>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
                  <label class="skill">
