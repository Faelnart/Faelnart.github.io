<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ficha RPG — Estrutura com Containers</title>
<style>
:root{
  --bg-start: #121212;
  --bg-end: #2d2d2d;
  --card-start: #ffffff;
  --card-end: #f3f4f6;
  --accent: #7c5cff;
  --muted: #64748b;
  --text: #1e293b;
  --radius: 12px;
  --shadow: 0 10px 25px rgba(0,0,0,0.1);
  --gap: 20px;
}

/* base original (mantive seu estilo principal) */
*{box-sizing:border-box; font-family: 'Inter', system-ui, sans-serif;}
body{margin:0; padding:25px; background: linear-gradient(180deg, #121212 0%, #2d2d2d 100%); color:var(--text); min-height:100vh;}
.container{max-width:1300px; margin:0 auto; display:grid; grid-template-columns: 1fr 350px; gap:var(--gap);}
header{grid-column:1/-1; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
header h1{color:var(--accent); font-size:24px; margin:0; text-transform: uppercase; letter-spacing: 1px;}
.btn-group{display:flex; gap:10px;}
.btn{background: var(--accent); color:white; border:0; padding:10px 20px; border-radius:8px; font-weight:700; cursor:pointer; transition: 0.2s;}
.btn:hover{filter: brightness(1.1); transform: translateY(-1px);}
.btn-secondary{background: #334155; color: white;}
.card{background: white; padding:20px; border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:var(--gap);}
.section-title{display:block; font-size:13px; font-weight:800; color:var(--muted); text-transform:uppercase; margin-bottom:15px; border-bottom:1px solid #f1f5f9; padding-bottom:5px;}
.field-group{display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:15px;}
.field{display:flex; flex-direction:column; gap:5px;}
label{font-size:11px; font-weight:700; color:var(--muted); text-transform: uppercase;}
input, select, textarea{padding:10px; border-radius:6px; border:1px solid #e2e8f0; font-size:14px; outline:none; background: #fcfcfc;}
input:focus{border-color:var(--accent); background: #fff;}
.big-input{font-size:22px; font-weight:800; border:0; background:transparent; padding:0; width:100%; color:var(--accent);}

/* Atributos/perícias originais */
.attr-grid{display:grid; grid-template-columns: repeat(6, 1fr); gap:10px;}
.attr-box{text-align:center; padding:10px; background:#f8fafc; border-radius:10px; border:1px solid #e2e8f0;}
.attr-box input{width:50px; text-align:center; font-size:18px; font-weight:800; padding:5px; margin-bottom:5px;}
.attr-mod{display:block; font-size:16px; font-weight:700; color:var(--accent);}

/* skills */
.skills-container{display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px;}
.skill-item{display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 10px; background:#fff; border:1px solid #f1f5f9; border-radius:6px;}
.skill-item input[type="checkbox"]{width:16px; height:16px; cursor:pointer;}
.skill-val{margin-left:auto; font-weight:800; color:var(--accent); min-width:25px; text-align:right;}

/* avatar */
.avatar-zone{width:100%; aspect-ratio:1/1; border-radius:12px; border:2px dashed #cbd5e1; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#f8fafc; transition:0.3s; position:relative; cursor: default;}
.avatar-zone img{width:100%; height:100%; object-fit:cover;}
.avatar-hint{font-size:11px; color:var(--muted); text-align:center; padding:20px;}
table{width:100%; border-collapse:collapse; margin-top:10px;}
th{text-align:left; font-size:11px; color:var(--muted); padding:8px;}
td{padding:5px; border-bottom:1px solid #f1f5f9;}
@media (max-width: 1000px) { .container{grid-template-columns: 1fr;} }

/* --- módulos (wrappers) --- */
.module { margin-bottom: var(--gap); }
.module[data-module] > .card { /* mantém aparência do card dentro do módulo */ }
.module.hidden { display: none !important; }

/* painel de controle opcional (pequeno) */
.module-control { position: fixed; right: 18px; top: 80px; background: #fff; border: 1px solid #e6e6e6; padding:10px; border-radius:8px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); font-size:13px; z-index:9999; }
.module-control label{display:flex;align-items:center;gap:8px;margin-bottom:6px}
</style>
</head>
<body>

<div class="container">

  <!-- Header module -->
  <div class="module" data-module="header">
    <header>
      <h1>Ficha de Personagem</h1>
      <div class="btn-group">
        <button class="btn" onclick="saveData()">Salvar</button>
        <button class="btn btn-secondary" onclick="exportJSON()">Exportar</button>
        <button class="btn btn-secondary" onclick="clearData()">Resetar</button>
      </div>
    </header>
  </div>

  <!-- Main left column: manter estrutura original, cada card envolvido por module -->
  <main>

    <div class="module" data-module="informacoes-basicas">
      <div class="card">
        <span class="section-title">Informações Básicas</span>
        <div style="display:grid; grid-template-columns: 1fr 200px; gap:20px;">
          <div class="field-group">
            <div class="field" style="grid-column: span 2;">
              <label>Nome do Personagem</label>
              <input id="nome" data-key="nome" class="big-input" type="text" placeholder="Ex: Valerius">
            </div>
            <div class="field"><label>Classe/Nível</label><input id="classe" data-key="classe" type="text"></div>
            <div class="field"><label>Antecedente</label><input id="antecedente" data-key="antecedente" type="text"></div>
            <div class="field"><label>Raça</label><input id="raca" data-key="raca" type="text"></div>
            <div class="field"><label>Tendência</label><input id="tendencia" data-key="tendencia" type="text"></div>
          </div>

          <div class="field">
            <label>Avatar (Solte a imagem aqui)</label>
            <div class="avatar-zone" id="avatarPreview">
              <div class="avatar-hint">Arraste uma foto para cá</div>
            </div>

            <label style="margin-top:10px; display:flex; align-items:center; gap:5px; cursor:pointer">
              <input type="checkbox" id="toggleCircular"> Estilo Circular
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="module" data-module="atributos">
      <div class="card">
        <span class="section-title">Atributos</span>
        <div class="attr-grid">
          <div class="attr-box"><label>FOR</label><input type="number" id="forca" data-key="forca" value="10"><span class="attr-mod" id="forca_mod">+0</span></div>
          <div class="attr-box"><label>DES</label><input type="number" id="destreza" data-key="destreza" value="10"><span class="attr-mod" id="destreza_mod">+0</span></div>
          <div class="attr-box"><label>CON</label><input type="number" id="constituicao" data-key="constituicao" value="10"><span class="attr-mod" id="constituicao_mod">+0</span></div>
          <div class="attr-box"><label>INT</label><input type="number" id="inteligencia" data-key="inteligencia" value="10"><span class="attr-mod" id="inteligencia_mod">+0</span></div>
          <div class="attr-box"><label>SAB</label><input type="number" id="sabedoria" data-key="sabedoria" value="10"><span class="attr-mod" id="sabedoria_mod">+0</span></div>
          <div class="attr-box"><label>CAR</label><input type="number" id="carisma" data-key="carisma" value="10"><span class="attr-mod" id="carisma_mod">+0</span></div>
        </div>
      </div>
    </div>

    <div class="module" data-module="pericias">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center">
          <span class="section-title">Perícias & Proficiências</span>
          <div class="field" style="width:100px; margin-bottom:10px">
            <label>Bônus Prof.</label>
            <input type="number" id="prof_bonus" data-key="prof_bonus" value="2" style="height:30px; text-align:center">
          </div>
        </div>
        <div class="skills-container" id="skillsContainer"></div>
      </div>
    </div>

    <div class="module" data-module="ataques">
      <div class="card">
        <span class="section-title">Ataques & Conjuração</span>
        <table id="weaponsTable">
          <thead><tr><th>Arma</th><th>Bônus Atq</th><th>Dano/Tipo</th><th>Notas</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
        <div style="display:flex; gap:10px; margin-top:10px">
          <input id="w_name" placeholder="Nome" style="flex:2">
          <input id="w_atq" placeholder="+5" style="flex:1">
          <input id="w_dmg" placeholder="1d8+3" style="flex:1">
          <button class="btn" onclick="addWeapon()">Add</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Right column (aside) -->
  <aside>

    <div class="module" data-module="status-vitais">
      <div class="card" style="background:var(--accent); color:white;">
        <span class="section-title" style="color:white; border-color:rgba(255,255,255,0.2)">Status Vitais</span>
        <div class="field"><label style="color:white">Pontos de Vida</label>
          <div style="display:flex; gap:5px; align-items:center">
            <input id="hp_atual" data-key="hp_atual" type="number" style="width:100%; background:rgba(0,0,0,0.2); border:0; color:white">
            <span>/</span>
            <input id="hp_max" data-key="hp_max" type="number" style="width:100%; background:rgba(0,0,0,0.2); border:0; color:white">
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px">
          <div class="field"><label style="color:white">CA</label><input id="ca" data-key="ca" type="number"></div>
          <div class="field"><label style="color:white">Iniciativa</label><input id="iniciativa" readonly></div>
        </div>
      </div>
    </div>

    <div class="module" data-module="sentidos">
      <div class="card">
        <span class="section-title">Sentidos</span>
        <div class="field"><label>Percepção Passiva</label><input id="perc_passiva" readonly></div>
        <div class="field" style="margin-top:10px"><label>Investigação Passiva</label><input id="inv_passiva" readonly></div>
      </div>
    </div>

    <div class="module" data-module="moedas">
      <div class="card">
        <span class="section-title">Moedas</span>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
          <div class="field"><label>PO</label><input data-key="po" type="number"></div>
          <div class="field"><label>PP</label><input data-key="pp" type="number"></div>
          <div class="field"><label>PC</label><input data-key="pc" type="number"></div>
          <div class="field"><label>PL</label><input data-key="pl" type="number"></div>
        </div>
      </div>
    </div>

  </aside>

</div>

<!-- painel de controle opcional para ativar/desativar módulos -->
<div class="module-control" id="moduleControl" aria-hidden="false" style="display:none">
  <strong>Módulos</strong>
  <div id="moduleControlList"></div>
</div>

<script>
/* ---------- Mantive toda a lógica original (IDs e funções) ---------- */
/* Lista de perícias padrão D&D 5e */
const ALL_SKILLS = [
  { name: 'Acrobacia', attr: 'destreza' },
  { name: 'Adestrar Animais', attr: 'sabedoria' },
  { name: 'Arcanismo', attr: 'inteligencia' },
  { name: 'Atletismo', attr: 'forca' },
  { name: 'Atuação', attr: 'carisma' },
  { name: 'Enganação', attr: 'carisma' },
  { name: 'Furtividade', attr: 'destreza' },
  { name: 'História', attr: 'inteligencia' },
  { name: 'Intimidação', attr: 'carisma' },
  { name: 'Intuição', attr: 'sabedoria' },
  { name: 'Investigação', attr: 'inteligencia' },
  { name: 'Medicina', attr: 'sabedoria' },
  { name: 'Natureza', attr: 'inteligencia' },
  { name: 'Percepção', attr: 'sabedoria' },
  { name: 'Persuasão', attr: 'carisma' },
  { name: 'Prestidigitação', attr: 'destreza' },
  { name: 'Religião', attr: 'inteligencia' },
  { name: 'Sobrevivência', attr: 'sabedoria' }
];

/* Render perícias (mantive ids compatíveis) */
function renderSkills() {
  const container = document.getElementById('skillsContainer');
  container.innerHTML = ALL_SKILLS.map(s => `
    <div class="skill-item">
      <input type="checkbox" class="skill-check" data-attr="${s.attr}" data-name="${s.name}" onchange="updateCalculations()">
      <span>${s.name} <small style="color:#94a3b8">(${s.attr.substring(0,3).toUpperCase()})</small></span>
      <span class="skill-val" id="val_${s.name.replace(/\s+/g,'_')}">+0</span>
    </div>
  `).join('');
}

/* Cálculos automáticos (mantive suas funções) */
function updateCalculations() {
  const prof = parseInt(document.getElementById('prof_bonus').value) || 0;
  const attrs = ['forca', 'destreza', 'constituicao', 'inteligencia', 'sabedoria', 'carisma'];
  const mods = {};
  attrs.forEach(a => {
    const score = parseInt(document.getElementById(a).value) || 10;
    const mod = Math.floor((score - 10) / 2);
    mods[a] = mod;
    const modEl = document.getElementById(a + '_mod');
    if(modEl) modEl.textContent = (mod >= 0 ? '+' : '') + mod;
  });

  document.querySelectorAll('.skill-check').forEach(cb => {
    const attrMod = mods[cb.dataset.attr];
    const total = attrMod + (cb.checked ? prof : 0);
    const id = 'val_' + cb.dataset.name.replace(/\s+/g,'_');
    const el = document.getElementById(id);
    if(el) el.textContent = (total >= 0 ? '+' : '') + total;
  });

  document.getElementById('iniciativa').value = (mods.destreza >= 0 ? '+' : '') + mods.destreza;
  const percProf = document.querySelector('[data-name="Percepção"]') && document.querySelector('[data-name="Percepção"]').checked ? prof : 0;
  if(document.getElementById('perc_passiva')) document.getElementById('perc_passiva').value = 10 + mods.sabedoria + percProf;
  const invProf = document.querySelector('[data-name="Investigação"]') && document.querySelector('[data-name="Investigação"]').checked ? prof : 0;
  if(document.getElementById('inv_passiva')) document.getElementById('inv_passiva').value = 10 + mods.inteligencia + invProf;
}

/* Avatar drag & drop (mantive comportamento: crop central e preview) */
const avZone = document.getElementById('avatarPreview');
if(avZone){
  avZone.addEventListener('dragover', e => { e.preventDefault(); avZone.style.borderColor = 'var(--accent)'; avZone.style.background = '#f1edff'; });
  avZone.addEventListener('dragleave', () => { avZone.style.borderColor = '#cbd5e1'; avZone.style.background = '#f8fafc'; });
  avZone.addEventListener('drop', e => {
    e.preventDefault();
    avZone.style.borderColor = '#cbd5e1';
    avZone.style.background = '#f8fafc';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = event => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const size = 400;
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext('2d');
          const side = Math.min(img.width, img.height);
          ctx.drawImage(img, (img.width-side)/2, (img.height-side)/2, side, side, 0, 0, size, size);
          const dataURL = canvas.toDataURL('image/jpeg', 0.8);
          avZone.innerHTML = `<img src="${dataURL}">`;
          avZone.dataset.imgData = dataURL;
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }
  });
}
document.getElementById('toggleCircular').onchange = e => { avZone.style.borderRadius = e.target.checked ? '50%' : '12px'; };

/* Weapons */
function addWeapon(data = null) {
  const row = document.createElement('tr');
  const name = data ? data.n : document.getElementById('w_name').value;
  const atq = data ? data.a : document.getElementById('w_atq').value;
  const dmg = data ? data.d : document.getElementById('w_dmg').value;
  if(!name && !data) return;
  row.innerHTML = `
    <td>${name}</td><td>${atq}</td><td>${dmg}</td><td>-</td>
    <td><button onclick="this.parentElement.parentElement.remove()" style="color:red; border:0; background:none; cursor:pointer">×</button></td>
  `;
  document.querySelector('#weaponsTable tbody').appendChild(row);
  if(!data) { document.getElementById('w_name').value = ''; document.getElementById('w_atq').value = ''; document.getElementById('w_dmg').value = ''; }
}

/* Persistence (mantive suas funções) */
const storageKey = 'rpg_sheet_data_final';
function saveData() {
  const data = { skills: {}, weapons: [] };
  document.querySelectorAll('[data-key]').forEach(el => data[el.dataset.key] = el.value);
  document.querySelectorAll('.skill-check').forEach(cb => data.skills[cb.dataset.name] = cb.checked);
  document.querySelectorAll('#weaponsTable tbody tr').forEach(tr => {
    const tds = tr.querySelectorAll('td');
    data.weapons.push({n: tds[0].innerText, a: tds[1].innerText, d: tds[2].innerText});
  });
  data.avatar = avZone && avZone.dataset.imgData ? avZone.dataset.imgData : '';
  data.circular = document.getElementById('toggleCircular').checked;
  localStorage.setItem(storageKey, JSON.stringify(data));
  alert("Ficha salva no navegador!");
}
function loadData() {
  const raw = localStorage.getItem(storageKey);
  if(!raw) return;
  const data = JSON.parse(raw);
  document.querySelectorAll('[data-key]').forEach(el => el.value = data[el.dataset.key] || '');
  document.querySelectorAll('.skill-check').forEach(cb => cb.checked = data.skills[cb.dataset.name] || false);
  if(data.avatar) { avZone.innerHTML = `<img src="${data.avatar}">`; avZone.dataset.imgData = data.avatar; }
  document.getElementById('toggleCircular').checked = data.circular;
  avZone.style.borderRadius = data.circular ? '50%' : '12px';
  document.querySelector('#weaponsTable tbody').innerHTML = '';
  data.weapons.forEach(w => addWeapon(w));
  updateCalculations();
}
function exportJSON() {
  const data = localStorage.getItem(storageKey);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'minha_ficha.json'; a.click();
}
function clearData() {
  if(confirm("Deseja apagar tudo?")) { localStorage.removeItem(storageKey); location.reload(); }
}

/* Init */
window.onload = () => {
  renderSkills();
  loadData();
  document.querySelectorAll('input').forEach(i => i.addEventListener('input', updateCalculations));
};
</script>

<script>
/* ---------- Funções para controlar módulos (não altera lógica) ---------- */
/* toggleModule(name, show) — mostra/oculta módulos por data-module */
function toggleModule(name, show) {
  const el = document.querySelector('[data-module="'+name+'"]');
  if(!el) return false;
  if(show === undefined) el.classList.toggle('hidden');
  else el.classList.toggle('hidden', !show);
  return true;
}

/* opcional: criar painel de controle para módulos (descomente para usar) */
(function createModuleControl(){
  const modules = Array.from(document.querySelectorAll('[data-module]')).map(m => m.dataset.module);
  if(!modules.length) return;
  const panel = document.getElementById('moduleControl');
  const list = document.getElementById('moduleControlList');
  modules.forEach(name=>{
    const id = 'ctl_'+name.replace(/[^a-z0-9\-_]/gi,'_');
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" id="${id}" ${!document.querySelector('[data-module="'+name+'"]').classList.contains('hidden')?'checked':''}> ${name}`;
    list.appendChild(label);
    label.querySelector('input').addEventListener('change', e => toggleModule(name, e.target.checked));
  });
  // mostrar painel se quiser: panel.style.display = 'block';
})();
</script>

</body>
</html>
