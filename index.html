<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ficha RPG — Completa, Lapidada, com Ícones e Paleta</title>
<style>
:root{
  --bg-start:#f6f8fb;
  --bg-end:#eef4fb;
  --card:#ffffff;
  --accent:#5b4ef7;
  --muted:#556070;
  --text:#071226;
  --radius:16px;
  --soft-radius:20px;
  --shadow:0 6px 18px rgba(7,18,38,0.06);
  --gap:18px;
  --glass: rgba(255,255,255,0.75);
}
/* Reset */
*{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Roboto,Arial}
html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg-start),var(--bg-end));color:var(--text);-webkit-font-smoothing:antialiased}
.app{max-width:1280px;margin:18px auto;display:grid;grid-template-columns:1fr 360px;grid-template-areas:"header header" "main aside";gap:var(--gap);align-items:start;padding:12px}

/* Header / Card */
.card{background:linear-gradient(180deg,var(--glass),var(--card));padding:16px;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(7,18,38,0.04)}
.header .card{display:flex;justify-content:space-between;align-items:center;gap:12px}
h1{margin:0;color:var(--accent);font-size:18px;font-weight:700}
.controls-row{display:flex;gap:8px;align-items:center}
.btn{background:linear-gradient(90deg,var(--accent),#6b57ff);color:#fff;border:0;padding:8px 12px;border-radius:12px;cursor:pointer;box-shadow:0 4px 10px rgba(91,78,247,0.12)}
.btn-ghost{background:#fff;border:1px solid rgba(7,18,38,0.06);padding:8px 12px;border-radius:12px;color:var(--muted);cursor:pointer}
.small{padding:6px 8px;font-size:13px;border-radius:10px}
.section-title{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:12px}

/* Layout */
.form-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
.attr-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:8px}
.attr-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;background:linear-gradient(180deg,#ffffff,#fbfdff);border-radius:14px;border:1px solid #eef4ff}
.attr-box label{font-size:12px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:8px}
.attr-box input{width:56px;font-weight:800;font-size:18px;border-radius:8px;padding:6px;border:1px solid #eef4ff;margin-top:8px}
.attr-mod{font-weight:800;color:var(--accent);margin-top:8px}
.attr-race{display:block;font-size:12px;color:#0b6b2f;margin-top:6px}

/* Skills */
.skills-container{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.skill-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:#fff;border:1px solid #eef4ff}
.skill-item label{flex:1;font-size:14px;display:flex;align-items:center;gap:8px}
.skill-val{font-weight:800;color:var(--accent);min-width:44px;text-align:right;border-radius:10px;padding:6px 8px;background:linear-gradient(90deg,#f6f7ff,#fff)}

/* Avatar circular */
.avatar-zone{width:100%;aspect-ratio:1/1;border-radius:50%;border:2px dashed rgba(91,78,247,0.14);display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(180deg,#fff,#fbfdff);cursor:pointer;position:relative}
.avatar-zone .img-wrap{position:absolute;left:50%;top:50%;transform-origin:center center;will-change:transform;transition:transform 80ms linear}
.avatar-zone img{display:block;max-width:none;user-select:none;pointer-events:none}
.avatar-controls{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.slider{width:160px}

/* Aside fixed */
.aside{position:sticky;top:22px;display:flex;flex-direction:column;gap:12px;align-self:start}
.aside .card{position:static;border-radius:14px}

/* Roll log */
.roll-log{max-height:220px;overflow:auto;border-radius:12px;padding:8px;background:#fff;border:1px solid #eef4ff}

/* Palette controls */
.palette-row{display:flex;gap:10px;align-items:center}
.color-input{width:36px;height:36px;border-radius:8px;border:1px solid #e6e9ef;padding:0}

/* Icons small style */
.icon{width:18px;height:18px;display:inline-block;vertical-align:middle;fill:currentColor}

/* Responsive */
@media (max-width:980px){
  .app{grid-template-columns:1fr;grid-template-areas:"header" "main" "aside";padding:10px}
  .form-grid{grid-template-columns:1fr}
  .aside{position:static}
}
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="card" role="banner">
      <h1>Ficha RPG — Lapidada</h1>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="palette-row" title="Paleta e seletor de cor">
          <label style="font-size:13px;color:var(--muted)">Cor principal</label>
          <input id="accentPicker" class="color-input" type="color" value="#5b4ef7" aria-label="Selecionar cor principal">
          <label style="font-size:13px;color:var(--muted)">Fundo</label>
          <input id="bgStartPicker" class="color-input" type="color" value="#f6f8fb" aria-label="Selecionar cor de fundo inicial">
          <input id="bgEndPicker" class="color-input" type="color" value="#eef4fb" aria-label="Selecionar cor de fundo final">
        </div>
        <div class="controls-row">
          <button id="saveBtn" class="btn">Salvar</button>
          <button id="exportBtn" class="btn-ghost">Exportar</button>
          <button id="importBtn" class="btn-ghost">Importar</button>
          <button id="clearBtn" class="btn-ghost">Limpar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <main class="main" style="grid-area:main">
    <div class="card" aria-labelledby="ident-title">
      <div id="ident-title" class="section-title">Identidade</div>

      <div class="form-grid">

        <!-- Left column -->
        <div>
          <div style="display:flex;gap:12px;align-items:center">
            <div style="flex:1">
              <label style="font-size:12px;color:var(--muted);font-weight:700">Nome</label>
              <input id="nome" type="text" value="Seu Nome" style="width:100%;padding:10px;border-radius:12px;border:1px solid #eef4ff;margin-top:8px">
            </div>
            <div style="width:120px">
              <label style="font-size:12px;color:var(--muted);font-weight:700">Nível</label>
              <input id="nivel" type="number" min="1" max="20" value="1" style="width:100%;padding:10px;border-radius:12px;border:1px solid #eef4ff;margin-top:8px">
            </div>
          </div>

          <div style="display:flex;gap:12px;margin-top:12px">
            <div style="flex:1">
              <label style="font-size:12px;color:var(--muted);font-weight:700">Classe</label>
              <input id="classe" type="text" style="width:100%;padding:10px;border-radius:12px;border:1px solid #eef4ff;margin-top:8px">
            </div>
            <div style="width:140px">
              <label style="font-size:12px;color:var(--muted);font-weight:700">XP</label>
              <input id="xp" type="number" min="0" value="0" style="width:100%;padding:10px;border-radius:12px;border:1px solid #eef4ff;margin-top:8px">
            </div>
          </div>

          <!-- Attributes -->
          <div style="margin-top:16px">
            <div class="section-title">Atributos</div>
            <div class="attr-grid">
              <div class="attr-box">
                <label for="forca">
                  <!-- SVG icon FOR -->
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a2 2 0 0 0-2 2v6H6a2 2 0 0 0-2 2v6h16v-6a2 2 0 0 0-2-2h-4V4a2 2 0 0 0-2-2z"/></svg>
                  FOR
                </label>
                <input id="forca" type="number" value="10" data-base="10">
                <div class="attr-mod" id="forca_mod">+0</div>
                <div class="attr-race" id="forca_race">+0 racial</div>
              </div>

              <div class="attr-box">
                <label for="destreza">
                  <!-- SVG icon DES -->
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l4 8h-8l4-8zm0 10a6 6 0 1 0 0 12 6 6 0 0 0 0-12z"/></svg>
                  DES
                </label>
                <input id="destreza" type="number" value="10" data-base="10">
                <div class="attr-mod" id="destreza_mod">+0</div>
                <div class="attr-race" id="destreza_race">+0 racial</div>
              </div>

              <div class="attr-box">
                <label for="constituicao">
                  <!-- SVG icon CON -->
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l9 4v6c0 5-4 9-9 10-5-1-9-5-9-10V6l9-4z"/></svg>
                  CON
                </label>
                <input id="constituicao" type="number" value="10" data-base="10">
                <div class="attr-mod" id="constituicao_mod">+0</div>
                <div class="attr-race" id="constituicao_race">+0 racial</div>
              </div>

              <div class="attr-box">
                <label for="inteligencia">
                  <!-- SVG icon INT -->
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 14h-2v-2h2v2zm0-4h-2V6h2v6z"/></svg>
                  INT
                </label>
                <input id="inteligencia" type="number" value="10" data-base="10">
                <div class="attr-mod" id="inteligencia_mod">+0</div>
                <div class="attr-race" id="inteligencia_race">+0 racial</div>
              </div>

              <div class="attr-box">
                <label for="sabedoria">
                  <!-- SVG icon SAB -->
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8 6 4 8 4 12c0 4 4 8 8 10 4-2 8-6 8-10 0-4-4-6-8-10z"/></svg>
                  SAB
                </label>
                <input id="sabedoria" type="number" value="10" data-base="10">
                <div class="attr-mod" id="sabedoria_mod">+0</div>
                <div class="attr-race" id="sabedoria_race">+0 racial</div>
              </div>

              <div class="attr-box">
                <label for="carisma">
                  <!-- SVG icon CAR -->
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"/></svg>
                  CAR
                </label>
                <input id="carisma" type="number" value="10" data-base="10">
                <div class="attr-mod" id="carisma_mod">+0</div>
                <div class="attr-race" id="carisma_race">+0 racial</div>
              </div>
            </div>

            <div style="display:flex;gap:12px;align-items:center;margin-top:12px">
              <div style="width:140px">
                <label style="font-size:12px;color:var(--muted);font-weight:700">Bônus Prof.</label>
                <input id="prof_bonus" type="number" value="2" style="width:100%;padding:8px;border-radius:10px;border:1px solid #eef4ff;margin-top:8px">
              </div>
              <label style="display:flex;align-items:center;gap:8px;color:var(--muted);margin-left:6px"><input id="autoProf" type="checkbox"> Calcular por nível</label>
              <div style="margin-left:auto;color:var(--muted);font-size:13px">Níveis 1–4:+2 • 5–8:+3 • 9–12:+4 • 13–16:+5 • 17–20:+6</div>
            </div>
          </div>

          <!-- Perícias -->
          <div style="margin-top:16px">
            <div class="section-title">Perícias</div>
            <div id="skillsContainer" class="skills-container" aria-live="polite"></div>
          </div>

        </div>

        <!-- Right column (avatar) -->
        <div>
          <div class="field"><label style="font-size:12px;color:var(--muted);font-weight:700">Avatar</label>
            <div id="avatarPreview" class="avatar-zone" title="Arraste ou clique para carregar">
              <div class="avatar-hint" style="text-align:center;color:var(--muted);padding:12px">Arraste ou clique para carregar</div>
            </div>
          </div>

          <div class="avatar-controls">
            <input id="avatarInput" type="file" accept="image/*" style="display:none">
            <button id="uploadAvatarBtn" class="btn-ghost small">Carregar</button>
            <button id="removeAvatarBtn" class="btn-ghost small">Remover</button>
            <button id="centerAvatarBtn" class="btn-ghost small">Centralizar</button>
            <button id="resetAvatarBtn" class="btn-ghost small">Resetar</button>
          </div>

          <div style="display:flex;gap:8px;align-items:center;margin-top:12px">
            <label style="font-size:13px;color:var(--muted)">Zoom</label>
            <input id="zoomSlider" class="slider" type="range" min="0.5" max="2" step="0.01" value="1">
            <span id="zoomVal" style="min-width:48px;text-align:right;color:var(--muted)">100%</span>
          </div>

        </div>

      </div>
    </div>

    <!-- Weapons / Spells -->
    <div class="card" style="margin-top:14px">
      <div class="section-title">Ataques & Magias</div>
      <table class="table" id="weaponsTable" aria-describedby="atk-title">
        <thead><tr><th>Nome</th><th>Bônus</th><th>Dano</th><th>Notas</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input id="w_name" placeholder="Nome" style="flex:2;padding:8px;border-radius:10px;border:1px solid #eef4ff">
        <input id="w_bonus" placeholder="+Atq" style="width:100px;padding:8px;border-radius:10px;border:1px solid #eef4ff">
        <input id="w_dmg" placeholder="1d8 + STR" style="flex:1;padding:8px;border-radius:10px;border:1px solid #eef4ff">
        <button id="addWeaponBtn" class="btn">Adicionar</button>
      </div>
    </div>

  </main>

  <!-- Aside -->
  <aside class="aside" style="grid-area:aside">

    <div class="card">
      <div class="section-title">Status Rápido</div>
      <div style="display:flex;gap:10px">
        <div style="flex:1"><label style="font-size:12px;color:var(--muted)">HP Atual</label><input id="hp_atual" type="number" value="10" style="width:100%;padding:8px;border-radius:10px;border:1px solid #eef4ff;margin-top:8px"></div>
        <div style="flex:1"><label style="font-size:12px;color:var(--muted)">HP Máx</label><input id="hp_max" type="number" value="10" style="width:100%;padding:8px;border-radius:10px;border:1px solid #eef4ff;margin-top:8px"></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:12px">
        <div style="flex:1"><label style="font-size:12px;color:var(--muted)">CA</label><input id="ca_quick" readonly style="width:100%;padding:8px;border-radius:10px;border:1px solid #eef4ff;margin-top:8px"></div>
        <div style="flex:1"><label style="font-size:12px;color:var(--muted)">Iniciativa</label><input id="iniciativa" readonly style="width:100%;padding:8px;border-radius:10px;border:1px solid #eef4ff;margin-top:8px"></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Sentidos</div>
      <div style="margin-top:6px"><label style="font-size:12px;color:var(--muted)">Percepção Passiva</label><input id="perc_passiva" readonly style="width:100%;padding:8px;border-radius:10px;border:1px solid #eef4ff;margin-top:8px"></div>
      <div style="margin-top:8px"><label style="font-size:12px;color:var(--muted)">Investigação Passiva</label><input id="inv_passiva" readonly style="width:100%;padding:8px;border-radius:10px;border:1px solid #eef4ff;margin-top:8px"></div>
    </div>

    <div class="card">
      <div class="section-title">Rolador Rápido</div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="quickSkillSelect" style="flex:1;padding:8px;border-radius:10px;border:1px solid #eef4ff"><option value="">— selecione perícia —</option></select>
        <span id="quickSkillInfo" style="font-size:13px;color:var(--muted)"></span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:10px">
        <button id="rollSkillBtn" class="btn-ghost">Rolar perícia</button>
      </div>
      <div style="margin-top:12px">
        <label style="font-size:12px;color:var(--muted)">1d20</label>
        <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
          <input id="rollMod" type="number" value="0" style="width:80px;padding:8px;border-radius:10px;border:1px solid #eef4ff">
          <button id="rollBtn" class="btn">1d20</button>
          <button id="advBtn" class="btn-ghost">Vantagem</button>
          <button id="disBtn" class="btn-ghost">Desvantagem</button>
        </div>
      </div>

      <div id="rollLog" class="roll-log" style="margin-top:12px"></div>
    </div>

  </aside>

</div>

<script>
/* Final stable JS with:
   - SVG icons already inline in HTML
   - color pickers to customize palette (accent and background gradient)
   - avatar pan/zoom (wheel-centered) with limits and slider
   - skills rendered (no roll buttons)
   - fixed aside column and corrected grid areas
   - persistence (localStorage), import/export, weapons
*/

/* Data */
const storageKey = 'ficha_rpg_final_v1';
const ALL_SKILLS = [
  { name:'Acrobacia', attr:'destreza' },
  { name:'Adestrar Animais', attr:'sabedoria' },
  { name:'Arcanismo', attr:'inteligencia' },
  { name:'Atletismo', attr:'forca' },
  { name:'Atuação', attr:'carisma' },
  { name:'Enganação', attr:'carisma' },
  { name:'Furtividade', attr:'destreza' },
  { name:'História', attr:'inteligencia' },
  { name:'Intimidação', attr:'carisma' },
  { name:'Intuição', attr:'sabedoria' },
  { name:'Investigação', attr:'inteligencia' },
  { name:'Medicina', attr:'sabedoria' },
  { name:'Natureza', attr:'inteligencia' },
  { name:'Percepção', attr:'sabedoria' },
  { name:'Persuasão', attr:'carisma' },
  { name:'Prestidigitação', attr:'destreza' },
  { name:'Religião', attr:'inteligencia' },
  { name:'Sobrevivência', attr:'sabedoria' }
];
const RACE_BONUSES = {
  'Humano (Padrão)': { forca:1, destreza:1, constituicao:1, inteligencia:1, sabedoria:1, carisma:1 },
  'Anão (Colina)': { constituicao:2, sabedoria:1 },
  'Anão (Montanha)': { forca:2, constituicao:2 },
  'Elfo (Alto)': { destreza:2, inteligencia:1 },
  'Elfo (da Floresta)': { destreza:2, sabedoria:1 },
  'Elfo (Drow)': { destreza:2, carisma:1 },
  'Halfling (Pés-leves)': { destreza:2, carisma:1 },
  'Halfling (Robusto)': { destreza:2, constituicao:1 },
  'Draconato': { forca:2, carisma:1 },
  'Gnomo (Floresta)': { inteligencia:2 },
  'Gnomo (Rocha)': { inteligencia:2, constituicao:1 },
  'Meio-Elfo': { carisma:2 },
  'Meio-Orc': { forca:2, constituicao:1 },
  'Tiefling': { carisma:2 }
};
let currentRaceBonuses = { forca:0, destreza:0, constituicao:0, inteligencia:0, sabedoria:0, carisma:0 };

function idSafe(s){ return String(s).replace(/\s+/g,'_').replace(/[^\w_]/g,''); }
function modFrom(score){ return Math.floor((score - 10) / 2); }
function formatMod(n){ return (n>=0?'+':'') + n; }
function now(){ return new Date().toLocaleString(); }

/* Render skills (no roll buttons) */
function renderSkillsUI(){
  const container = document.getElementById('skillsContainer');
  const quick = document.getElementById('quickSkillSelect');
  container.innerHTML = ''; quick.innerHTML = '<option value="">— selecione —</option>';
  ALL_SKILLS.forEach(s=>{
    const key = idSafe(s.name);
    const div = document.createElement('div');
    div.className = 'skill-item';
    // small SVG for skill (generic compass icon)
    const svg = `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3 3-7z"/></svg>`;
    div.innerHTML = `
      <input type="checkbox" class="skill-check" data-attr="${s.attr}" data-name="${s.name}" data-key="${key}" id="chk_${key}">
      <label for="chk_${key}">${svg}<span>${s.name} <small style="color:var(--muted)">(${s.attr.substring(0,3).toUpperCase()})</small></span></label>
      <span class="skill-val" id="val_${key}">+0</span>
    `;
    container.appendChild(div);
    const opt = document.createElement('option'); opt.value = key; opt.textContent = s.name; quick.appendChild(opt);
  });
}

/* Attributes & race handling */
function applyRaceBonusesFromSelection(){
  currentRaceBonuses = { forca:0, destreza:0, constituicao:0, inteligencia:0, sabedoria:0, carisma:0 };
  const sel = document.getElementById('racaSelect');
  if(!sel) return;
  const val = sel.value;
  if(!val){ updateRaceUI(); updateAll(); return; }
  if(RACE_BONUSES[val]) Object.keys(RACE_BONUSES[val]).forEach(k=> currentRaceBonuses[k] = RACE_BONUSES[val][k] || 0);
  applyRacialToVisibleAttributes();
  updateRaceUI();
  updateAll();
}
function updateRaceUI(){
  ['forca','destreza','constituicao','inteligencia','sabedoria','carisma'].forEach(a=>{
    const el = document.getElementById(a + '_race');
    if(el) el.textContent = ((currentRaceBonuses[a]||0)>=0?'+':'') + (currentRaceBonuses[a]||0) + ' racial';
  });
}
function applyRacialToVisibleAttributes(){
  ['forca','destreza','constituicao','inteligencia','sabedoria','carisma'].forEach(a=>{
    const input = document.getElementById(a);
    if(!input) return;
    let base = parseInt(input.dataset.base);
    if(isNaN(base)) base = parseInt(input.value) || 10;
    input.dataset.base = base;
    const raceBonus = currentRaceBonuses[a] || 0;
    input.value = base + raceBonus;
  });
}

/* Bind attribute inputs */
function bindAttributeInputs(){
  ['forca','destreza','constituicao','inteligencia','sabedoria','carisma'].forEach(a=>{
    const input = document.getElementById(a);
    if(!input) return;
    input.addEventListener('input', ()=>{
      const raceBonus = currentRaceBonuses[a] || 0;
      let val = parseInt(input.value);
      if(isNaN(val)) val = 0;
      const newBase = val - raceBonus;
      input.dataset.base = newBase;
      input.value = newBase + raceBonus;
      updateAll();
    });
    input.addEventListener('blur', ()=>{
      let val = parseInt(input.value);
      if(isNaN(val) || val < 1) val = 1;
      const raceBonus = currentRaceBonuses[a] || 0;
      const newBase = val - raceBonus;
      input.dataset.base = newBase;
      input.value = newBase + raceBonus;
      updateAll();
    });
  });
}

/* Update derived values */
function updateAll(){
  const attrs = ['forca','destreza','constituicao','inteligencia','sabedoria','carisma'];
  const mods = {};
  attrs.forEach(a=>{
    const input = document.getElementById(a);
    const base = parseInt(input?.dataset.base) || 10;
    const raceBonus = currentRaceBonuses[a] || 0;
    const effective = base + raceBonus;
    const m = modFrom(effective);
    mods[a] = m;
    const modEl = document.getElementById(a + '_mod');
    if(modEl) modEl.textContent = formatMod(m);
  });

  const prof = parseInt(document.getElementById('prof_bonus')?.value || 0);
  document.querySelectorAll('.skill-check').forEach(cb=>{
    const attrMod = mods[cb.dataset.attr] || 0;
    const total = attrMod + (cb.checked ? prof : 0);
    const el = document.getElementById('val_' + (cb.dataset.key || idSafe(cb.dataset.name || '')));
    if(el) el.textContent = formatMod(total);
  });

  const iniEl = document.getElementById('iniciativa');
  if(iniEl) iniEl.value = formatMod(mods.destreza || 0);

  const percCb = Array.from(document.querySelectorAll('.skill-check')).find(c=>c.dataset.name==='Percepção');
  const invCb = Array.from(document.querySelectorAll('.skill-check')).find(c=>c.dataset.name==='Investigação');
  const percVal = 10 + (mods.sabedoria || 0) + ((percCb && percCb.checked) ? prof : 0);
  const invVal = 10 + (mods.inteligencia || 0) + ((invCb && invCb.checked) ? prof : 0);
  const percEl = document.getElementById('perc_passiva'); if(percEl) percEl.value = percVal;
  const invEl = document.getElementById('inv_passiva'); if(invEl) invEl.value = invVal;
}

/* Prof by level */
function profFromLevel(level){
  level = parseInt(level || 1, 10);
  if(isNaN(level) || level < 1) level = 1;
  if(level <= 4) return 2;
  if(level <= 8) return 3;
  if(level <= 12) return 4;
  if(level <= 16) return 5;
  return 6;
}
function updateProfByLevel(){
  const auto = !!document.getElementById('autoProf')?.checked;
  const nivelEl = document.getElementById('nivel');
  const profEl = document.getElementById('prof_bonus');
  if(!nivelEl || !profEl) return;
  const nivel = parseInt(nivelEl.value || 1, 10) || 1;
  if(auto){ profEl.value = profFromLevel(nivel); profEl.readOnly = true; } else { profEl.readOnly = false; }
  updateAll();
}
document.getElementById('nivel')?.addEventListener('input', ()=> updateProfByLevel());
document.getElementById('autoProf')?.addEventListener('change', ()=> updateProfByLevel());

/* Rolling utilities */
function rollDie(sides=20){ return Math.floor(Math.random()*sides)+1; }
function rollWithMod(mod=0){ const r = rollDie(20); return {roll:r,total:r+mod}; }
function rollAdvDis(type='normal', mod=0){ const a=rollDie(20), b=rollDie(20); const chosen = type==='adv'?Math.max(a,b):Math.min(a,b); return {a,b,chosen,total:chosen+mod}; }
function addRollLog(text){ const log = document.getElementById('rollLog'); if(!log) return; const div = document.createElement('div'); div.style.padding='6px 8px'; div.style.borderBottom='1px dashed #f1f5f9'; div.style.fontSize='13px'; div.textContent = `[${now()}] ${text}`; log.prepend(div); while(log.children.length>200) log.removeChild(log.lastChild); }

/* Quick roll handlers */
document.getElementById('rollBtn')?.addEventListener('click', ()=>{
  const mod = parseInt(document.getElementById('rollMod')?.value || 0);
  const r = rollWithMod(mod);
  addRollLog(`1d20: ${r.roll} + ${mod} = ${r.total}`);
});
document.getElementById('advBtn')?.addEventListener('click', ()=>{
  const mod = parseInt(document.getElementById('rollMod')?.value || 0);
  const res = rollAdvDis('adv',mod);
  addRollLog(`1d20 (vantagem): ${res.a}, ${res.b} → ${res.chosen} + ${mod} = ${res.total}`);
});
document.getElementById('disBtn')?.addEventListener('click', ()=>{
  const mod = parseInt(document.getElementById('rollMod')?.value || 0);
  const res = rollAdvDis('dis',mod);
  addRollLog(`1d20 (desvantagem): ${res.a}, ${res.b} → ${res.chosen} + ${mod} = ${res.total}`);
});

/* Quick skill info */
function onQuickSkillChange(){
  const sel = document.getElementById('quickSkillSelect');
  const info = document.getElementById('quickSkillInfo');
  const rollMod = document.getElementById('rollMod');
  if(!sel || !info || !rollMod) return;
  const key = sel.value;
  if(!key){ info.textContent = ''; return; }
  const cb = document.querySelector(`.skill-check[data-key="${key}"]`);
  if(!cb){ info.textContent = ''; return; }
  const attr = cb.dataset.attr;
  const base = parseInt(document.getElementById(attr)?.dataset.base) || 10;
  const raceBonus = currentRaceBonuses[attr] || 0;
  const attrMod = modFrom(base + raceBonus);
  const prof = cb.checked ? parseInt(document.getElementById('prof_bonus')?.value || 0) : 0;
  const total = attrMod + prof;
  rollMod.value = total;
  const attrLabel = attr.substring(0,3).toUpperCase();
  info.textContent = `${formatMod(total)} = ${formatMod(attrMod)} (${attrLabel})${prof ? ` ${formatMod(prof)} (Prof)` : ''}`;
}
document.getElementById('quickSkillSelect')?.addEventListener('change', onQuickSkillChange);
document.getElementById('rollSkillBtn')?.addEventListener('click', ()=>{
  const sel = document.getElementById('quickSkillSelect'); if(!sel) return;
  const key = sel.value; if(!key){ alert('Selecione uma perícia.'); return; }
  const cb = document.querySelector(`.skill-check[data-key="${key}"]`);
  if(!cb) return;
  const attr = cb.dataset.attr;
  const base = parseInt(document.getElementById(attr)?.dataset.base) || 10;
  const raceBonus = currentRaceBonuses[attr] || 0;
  const mod = modFrom(base + raceBonus) + (cb.checked ? parseInt(document.getElementById('prof_bonus')?.value||0) : 0);
  const r = rollWithMod(mod);
  addRollLog(`${cb.dataset.name}: ${r.roll} + ${mod} = ${r.total}`);
});

/* Weapons */
function addWeaponRow(obj){

  tbody.appendChild(tr);

document.getElementById('addWeaponBtn')?.addEventListener('click', ()=>{

  const bonus = document.getElementById('w_bonus')?.value || '';
  const dmg = document.getElementById('w_dmg')?.value || '';

/* Avatar: pan/zoom with wheel centered on cursor */
const avatarPreview = document.getElementById('avatarPreview');
const avatarInput = document.getElementById('avatarInput');
const uploadAvatarBtn = document.getElementById('uploadAvatarBtn');
const removeAvatarBtn = document.getElementById('removeAvatarBtn');
const zoomSlider = document.getElementById('zoomSlider');
const zoomVal = document.getElementById('zoomVal');
const centerAvatarBtn = document.getElementById('centerAvatarBtn');
const resetAvatarBtn = document.getElementById('resetAvatarBtn');

let imgState = { src:'', scale:1, offsetX:0, offsetY:0, naturalW:0, naturalH:0, fitScale:1 };
const MIN_SCALE = 0.5, MAX_SCALE = 2.0;

function ensureImageElement(dataURL){
  let wrap = avatarPreview.querySelector('.img-wrap');
  if(!wrap){
    wrap = document.createElement('div');
    wrap.className = 'img-wrap';
    avatarPreview.innerHTML = '';
    avatarPreview.appendChild(wrap);
  }
  let img = wrap.querySelector('img');
  if(!img){
    img = document.createElement('img');
    img.draggable = false;
    wrap.appendChild(img);
  }
  img.src = dataURL;
  img.onload = ()=>{
    imgState.naturalW = img.naturalWidth;
    imgState.naturalH = img.naturalHeight;
    const rect = avatarPreview.getBoundingClientRect();
    const cw = rect.width;
    const ch = rect.height;
    const scaleX = cw / imgState.naturalW;
    const scaleY = ch / imgState.naturalH;
    const fit = Math.max(scaleX, scaleY);
    imgState.fitScale = Math.min(Math.max(fit, 0.6), 1.1);
    if(!imgState.scale || imgState.scale === undefined) imgState.scale = imgState.fitScale;
    if(!imgState.offsetX && !imgState.offsetY){ imgState.offsetX = 0; imgState.offsetY = 0; }
    applyTransform();
  };
}

function applyTransform(){
  const wrap = avatarPreview.querySelector('.img-wrap');
  if(!wrap) return;
  wrap.style.transform = `translate(-50%,-50%) translate(${imgState.offsetX}px, ${imgState.offsetY}px) scale(${imgState.scale})`;
  zoomSlider.value = imgState.scale;
  zoomVal.textContent = Math.round(imgState.scale * 100) + '%';
}

/* Drag */
let dragging = false;
let dragStart = {x:0,y:0};
let startOffset = {x:0,y:0};

avatarPreview.addEventListener('pointerdown', (e)=>{
  const wrap = avatarPreview.querySelector('.img-wrap');
  if(!wrap) return;
  e.preventDefault();
  avatarPreview.setPointerCapture(e.pointerId);
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  startOffset = { x: imgState.offsetX, y: imgState.offsetY };
});

window.addEventListener('pointermove', (e)=>{
  if(!dragging) return;
  e.preventDefault();
  const dx = e.clientX - dragStart.x;
  const dy = e.clientY - dragStart.y;
  imgState.offsetX = startOffset.x + dx;
  imgState.offsetY = startOffset.y + dy;
  applyTransform();
});

window.addEventListener('pointerup', (e)=>{
  if(!dragging) return;
  dragging = false;
  saveToLocal(true);
});

/* Wheel zoom centered on cursor */
avatarPreview.addEventListener('wheel', (e)=>{
  if(!avatarPreview.querySelector('img')) return;
  e.preventDefault();
  const rect = avatarPreview.getBoundingClientRect();
  const cx = e.clientX - rect.left - rect.width/2; // cursor relative to center
  const cy = e.clientY - rect.top - rect.height/2;
  const delta = -e.deltaY || e.wheelDelta;
  const zoomFactor = delta > 0 ? 1.08 : 0.92;
  let newScale = imgState.scale * zoomFactor;
  newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
  const ratio = newScale / imgState.scale;
  imgState.offsetX = (imgState.offsetX - cx) * ratio + cx;
  imgState.offsetY = (imgState.offsetY - cy) * ratio + cy;
  imgState.scale = newScale;
  applyTransform();
  saveToLocal(true);
}, { passive:false });

/* Slider zoom (keeps center) */
zoomSlider.addEventListener('input', (e)=>{
  const newScale = parseFloat(e.target.value);
  const prev = imgState.scale || 1;
  const ratio = newScale / prev;
  imgState.offsetX = imgState.offsetX * ratio;
  imgState.offsetY = imgState.offsetY * ratio;
  imgState.scale = newScale;
  applyTransform();
  saveToLocal(true);
});

/* Buttons & drag-drop */
uploadAvatarBtn.addEventListener('click', ()=> avatarInput.click());
avatarInput.addEventListener('change', e=>{
  const f = e.target.files && e.target.files[0];
  if(f) processAvatarFile(f);
});
removeAvatarBtn.addEventListener('click', ()=>{
  avatarPreview.innerHTML = '<div class="avatar-hint" style="color:var(--muted);padding:12px;text-align:center">Arraste ou clique para carregar</div>';
  imgState = { src:'', scale:1, offsetX:0, offsetY:0, naturalW:0, naturalH:0, fitScale:1 };
  saveToLocal(true);
});
centerAvatarBtn.addEventListener('click', ()=>{ imgState.offsetX = 0; imgState.offsetY = 0; applyTransform(); saveToLocal(true); });
resetAvatarBtn.addEventListener('click', ()=>{ imgState.scale = imgState.fitScale || 1; imgState.offsetX = 0; imgState.offsetY = 0; applyTransform(); saveToLocal(true); });

['dragenter','dragover'].forEach(ev=> avatarPreview.addEventListener(ev, e=>{ e.preventDefault(); avatarPreview.style.borderColor='rgba(91,78,247,0.28)'; avatarPreview.style.background='#fbfbff'; }));
['dragleave','drop'].forEach(ev=> avatarPreview.addEventListener(ev, e=>{ e.preventDefault(); avatarPreview.style.borderColor='rgba(91,78,247,0.14)'; avatarPreview.style.background='linear-gradient(180deg,#fff,#fbfdff)'; }));
avatarPreview.addEventListener('drop', e=>{
  e.preventDefault();
  const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if(f) processAvatarFile(f);
});
function processAvatarFile(file){
  if(!file.type.startsWith('image/')) return alert('Arquivo não é imagem.');
  const reader = new FileReader();
  reader.onload = ev=>{
    const dataURL = ev.target.result;
    imgState.src = dataURL;
    imgState.scale = undefined;
    imgState.offsetX = 0; imgState.offsetY = 0;
    ensureImageElement(dataURL);
    saveToLocal(true);
  };
  reader.readAsDataURL(file);
}

/* Palette controls: accent and background gradient */
const accentPicker = document.getElementById('accentPicker');
const bgStartPicker = document.getElementById('bgStartPicker');
const bgEndPicker = document.getElementById('bgEndPicker');

function applyPaletteFromPickers(){
  const accent = accentPicker.value || '#5b4ef7';
  const bgStart = bgStartPicker.value || '#f6f8fb';
  const bgEnd = bgEndPicker.value || '#eef4fb';
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--bg-start', bgStart);
  document.documentElement.style.setProperty('--bg-end', bgEnd);
  // adjust muted color for readability (simple desaturate)
  document.documentElement.style.setProperty('--muted', '#556070');
}
accentPicker.addEventListener('input', applyPaletteFromPickers);
bgStartPicker.addEventListener('input', applyPaletteFromPickers);
bgEndPicker.addEventListener('input', applyPaletteFromPickers);

/* Persistence */
function gatherData(){
  const data = {};
  data.nome = document.getElementById('nome')?.value || '';
  data.classe = document.getElementById('classe')?.value || '';
  data.nivel = document.getElementById('nivel')?.value || 1;
  data.xp = document.getElementById('xp')?.value || 0;
  ['forca','destreza','constituicao','inteligencia','sabedoria','carisma'].forEach(a=>{
    const el = document.getElementById(a);
    data[a] = parseInt(el?.dataset.base) || parseInt(el?.value) || 10;
  });
  data.prof_bonus = parseInt(document.getElementById('prof_bonus')?.value || 0);
  data.skills = {};
  document.querySelectorAll('.skill-check').forEach(cb=> data.skills[cb.dataset.name] = !!cb.checked);
  data.weapons = [];
  document.querySelectorAll('#weaponsTable tbody tr').forEach(tr=>{
    const tds = tr.querySelectorAll('td');
    data.weapons.push({ name:tds[0].innerText, bonus:tds[1].innerText, dmg:tds[2].innerText, notes:tds[3].innerText });
  });
  data.avatar = imgState.src || '';
  data.avatar_scale = imgState.scale || imgState.fitScale || 1;
  data.avatar_offsetX = imgState.offsetX || 0;
  data.avatar_offsetY = imgState.offsetY || 0;
  data.hp_atual = document.getElementById('hp_atual')?.value || 10;
  data.hp_max = document.getElementById('hp_max')?.value || 10;
  data.palette = { accent: accentPicker.value, bgStart: bgStartPicker.value, bgEnd: bgEndPicker.value };
  return data;
}
function applyData(data){
  if(!data) return;
  document.getElementById('nome').value = data.nome || '';
  document.getElementById('classe').value = data.classe || '';
  document.getElementById('nivel').value = data.nivel || 1;
  document.getElementById('xp').value = data.xp || 0;
  document.getElementById('prof_bonus').value = data.prof_bonus || 2;
  ['forca','destreza','constituicao','inteligencia','sabedoria','carisma'].forEach(a=>{
    const el = document.getElementById(a);
    if(el){ el.dataset.base = data[a] || 10; el.value = data[a] || 10; }
  });
  document.querySelectorAll('.skill-check').forEach(cb=> cb.checked = !!(data.skills && data.skills[cb.dataset.name]));
  const tbody = document.querySelector('#weaponsTable tbody'); if(tbody) tbody.innerHTML = '';
  (data.weapons || []).forEach(w=> addWeaponRow({ name:w.name, bonus:w.bonus, dmg:w.dmg, notes:w.notes }));
  if(data.avatar){
    imgState.src = data.avatar;
    imgState.scale = data.avatar_scale || 1;
    imgState.offsetX = data.avatar_offsetX || 0;
    imgState.offsetY = data.avatar_offsetY || 0;
    ensureImageElement(imgState.src);
    setTimeout(()=>applyTransform(),120);
  }
  document.getElementById('hp_atual').value = data.hp_atual || 10;
  document.getElementById('hp_max').value = data.hp_max || 10;
  if(data.palette){
    accentPicker.value = data.palette.accent || accentPicker.value;
    bgStartPicker.value = data.palette.bgStart || bgStartPicker.value;
    bgEndPicker.value = data.palette.bgEnd || bgEndPicker.value;
    applyPaletteFromPickers();
  }
  updateAll();
}

function saveToLocal(silent=false){
  try{ const data = gatherData(); localStorage.setItem(storageKey, JSON.stringify(data)); if(!silent) addRollLog('Ficha salva localmente.'); }catch(e){ console.error(e); if(!silent) alert('Erro ao salvar.'); }
}
function loadFromLocal(){ try{ const raw = localStorage.getItem(storageKey); if(!raw) return; const data = JSON.parse(raw); applyData(data); addRollLog('Ficha carregada.'); }catch(e){ console.error(e); } }

document.getElementById('exportBtn')?.addEventListener('click', ()=>{ try{ const data = gatherData(); const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'ficha_rpg.json'; a.click(); URL.revokeObjectURL(url); }catch(e){ console.error(e); alert('Erro ao exportar.'); } });
document.getElementById('importBtn')?.addEventListener('click', ()=>{ const inp = document.createElement('input'); inp.type='file'; inp.accept='application/json'; inp.onchange = e=>{ const f = e.target.files[0]; if(!f) return; const reader = new FileReader(); reader.onload = ev=>{ try{ const data = JSON.parse(ev.target.result); applyData(data); addRollLog('JSON importado.'); }catch(err){ alert('Arquivo inválido.'); } }; reader.readAsText(f); }; inp.click(); });
document.getElementById('clearBtn')?.addEventListener('click', ()=>{ if(confirm('Limpar todos os campos?')){ localStorage.removeItem(storageKey); location.reload(); } });

/* Init */
window.addEventListener('load', ()=>{
  renderSkillsUI();
  bindAttributeInputs();
  document.addEventListener('change', e=>{ if(e.target && e.target.matches && e.target.matches('.skill-check')) updateAll(); });
  document.getElementById('quickSkillSelect')?.addEventListener('change', onQuickSkillChange);
  document.getElementById('rollSkillBtn')?.addEventListener('click', ()=>{ const sel = document.getElementById('quickSkillSelect'); if(!sel) return; const key = sel.value; if(!key){ alert('Selecione uma perícia.'); return; } const cb = document.querySelector(`.skill-check[data-key="${key}"]`); if(!cb) return; const attr = cb.dataset.attr; const base = parseInt(document.getElementById(attr)?.dataset.base) || 10; const raceBonus = currentRaceBonuses[attr] || 0; const mod = modFrom(base + raceBonus) + (cb.checked ? parseInt(document.getElementById('prof_bonus')?.value||0) : 0); const r = rollWithMod(mod); addRollLog(`${cb.dataset.name}: ${r.roll} + ${mod} = ${r.total}`); });
  document.getElementById('saveBtn')?.addEventListener('click', ()=>{ saveToLocal(); alert('Ficha salva.'); });
  document.getElementById('uploadAvatarBtn')?.addEventListener('click', ()=> avatarInput.click());
  avatarInput?.addEventListener('change', e=>{ const f = e.target.files && e.target.files[0]; if(f) processAvatarFile(f); });
  // palette pickers
  applyPaletteFromPickers();
  // load saved
  loadFromLocal();
  applyRacialToVisibleAttributes();
  updateAll();
  addRollLog('Ficha pronta e atualizada.');
});
</script>
